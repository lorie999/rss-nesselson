name: Actualitzar feed RSS

on:
  schedule:
    - cron: '0 8 * * *'  # Cada dia a les 8h del matí
  workflow_dispatch:       # També permet executar-lo manualment

jobs:
  generar-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Descarregar el repositori
        uses: actions/checkout@v4

      - name: Instal·lar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar llibreries
        run: pip install requests cloudscraper beautifulsoup4 feedgen

      - name: Executar el script
        run: python feed_nesselson.py

      - name: Guardar el feed actualitzat
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add nesselson.rss
          git commit -m "Feed actualitzat automàticament" || echo "Sense canvis"
          git push
