name: Actualitzar feed RSS
on:
  schedule:
    - cron: '0 8 * * *'  # S'executa cada dia a les 8:00 AM
  workflow_dispatch:     # Permet l'execució manual
jobs:
  generar-feed:
    runs-on: ubuntu-latest    
    permissions:
      contents: write
    steps:
      - name: Descarregar el repositori
        uses: actions/checkout@v4
      - name: Instal·lar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instal·lar llibreries
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper beautifulsoup4 feedgen
      - name: Executar el script
        run: python feed_nesselson.py
      - name: Guardar el feed actualitzat
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"          
          git add nesselson.rss          
          if ! git diff --cached --quiet; then
            git commit -m "Feed actualitzat automàticament"
            git push
          else
            echo "No s'han detectat canvis al feed."
          fi
